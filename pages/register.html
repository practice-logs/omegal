<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Create Account – NexusChat</title>
<link rel="stylesheet" href="../css/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">
<div class="bg-blobs"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="auth-box">
  <div style="position:absolute;top:1.1rem;right:1.1rem;">
    <button class="theme-btn" id="thbtn" onclick="toggleTheme()"><i class="fas fa-moon" id="thico"></i></button>
  </div>
  <div class="auth-logo">
    <div class="auth-logo-ico"><i class="fas fa-bolt"></i></div>
    <div class="auth-logo-name">NexusChat</div>
    <div class="auth-logo-sub">Join thousands of chatters today</div>
  </div>
  <h2 class="auth-h">Create your account</h2>
  <p class="auth-sub">Fill in the details below to get started for free</p>
  <div class="alert alert-err" id="err"><i class="fas fa-exclamation-circle"></i><span id="errtxt"></span></div>
  <div class="inp-group">
    <label><i class="fas fa-envelope"></i> Email Address</label>
    <div class="inp-wrap"><i class="fas fa-envelope ico"></i><input class="inp" type="email" id="email" placeholder="you@example.com"/></div>
  </div>
  <div class="inp-group">
    <label><i class="fas fa-lock"></i> Password</label>
    <div class="inp-wrap">
      <i class="fas fa-lock ico"></i>
      <input class="inp" type="password" id="pw" placeholder="Min 6 characters" oninput="checkStrength()" style="padding-right:2.6rem;"/>
      <button class="eye-btn" type="button" onclick="toggleEye('pw','e1')"><i class="fas fa-eye" id="e1"></i></button>
    </div>
    <div class="pw-bar"><div class="pw-fill" id="pwfill"></div></div>
    <div class="fnote" id="pwlbl" style="color:var(--textD);"></div>
  </div>
  <div class="inp-group">
    <label><i class="fas fa-shield-alt"></i> Confirm Password</label>
    <div class="inp-wrap">
      <i class="fas fa-shield-alt ico"></i>
      <input class="inp" type="password" id="cpw" placeholder="Repeat your password" style="padding-right:2.6rem;"/>
      <button class="eye-btn" type="button" onclick="toggleEye('cpw','e2')"><i class="fas fa-eye" id="e2"></i></button>
    </div>
  </div>
  <div style="display:flex;align-items:flex-start;gap:.5rem;margin-bottom:1.4rem;font-size:.83rem;">
    <input type="checkbox" id="terms" style="accent-color:var(--accent);margin-top:.2rem;flex-shrink:0;width:14px;height:14px;"/>
    <label for="terms" style="color:var(--textM);cursor:pointer;line-height:1.5;">I agree to the <a href="#" style="color:var(--accent)">Terms of Service</a> and <a href="#" style="color:var(--accent)">Privacy Policy</a></label>
  </div>
  <button class="btn btn-primary w-full" id="regbtn" onclick="doRegister()"><i class="fas fa-user-plus"></i> Create Account</button>
  <p class="auth-foot">Already have an account? <a href="login.html">Sign in here</a></p>
</div>
<div id="toast-box"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBeT226lzGP0ERDY7QZhKF8zfo0OwSGEZ4",authDomain:"fir-50409.firebaseapp.com",databaseURL:"https://fir-50409-default-rtdb.firebaseio.com",projectId:"fir-50409",storageBucket:"fir-50409.firebasestorage.app",messagingSenderId:"336958746825",appId:"1:336958746825:web:dc23031418217663b85d18"};
const app=initializeApp(cfg),auth=getAuth(app),db=getDatabase(app);
const st=localStorage.getItem('nc_theme')||'dark';document.documentElement.setAttribute('data-theme',st);document.getElementById('thico').className=st==='dark'?'fas fa-moon':'fas fa-sun';
window.toggleTheme=()=>{const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('nc_theme',n);document.getElementById('thico').className=n==='dark'?'fas fa-moon':'fas fa-sun';};
onAuthStateChanged(auth,async u=>{if(u){const s=await get(ref(db,`users/${u.uid}/username`));location.href=s.exists()?'../views/dashboard.html':'create-username.html';}});
window.checkStrength=()=>{const v=document.getElementById('pw').value,f=document.getElementById('pwfill'),l=document.getElementById('pwlbl');let s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;const lvl=[{c:'#FF5252',t:'Too weak'},{c:'#FF5252',t:'Weak'},{c:'#FFB84D',t:'Fair'},{c:'#4ADE80',t:'Strong'},{c:'#4ADE80',t:'Very strong'}][Math.min(s,4)];f.style.width=(s*20)+'%';f.style.background=lvl.c;l.textContent=v.length?lvl.t:'';l.style.color=lvl.c;};
window.toggleEye=(id,ico)=>{const p=document.getElementById(id),i=document.getElementById(ico);if(p.type==='password'){p.type='text';i.className='fas fa-eye-slash';}else{p.type='password';i.className='fas fa-eye';}};
window.doRegister=async()=>{
  const em=document.getElementById('email').value.trim(),pw=document.getElementById('pw').value,cpw=document.getElementById('cpw').value,terms=document.getElementById('terms').checked;
  const btn=document.getElementById('regbtn');
  document.getElementById('err').classList.remove('show');
  if(!em||!pw||!cpw){show('Fill in all fields.');return;}
  if(pw.length<6){show('Password must be at least 6 characters.');return;}
  if(pw!==cpw){show('Passwords do not match.');return;}
  if(!terms){show('Please accept the Terms of Service.');return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Creating account...';
  try{await createUserWithEmailAndPassword(auth,em,pw);}
  catch(e){btn.disabled=false;btn.innerHTML='<i class="fas fa-user-plus"></i> Create Account';const m={'auth/email-already-in-use':'An account with this email already exists.','auth/invalid-email':'Invalid email address.','auth/weak-password':'Password is too weak.'};show(m[e.code]||'Registration failed. Try again.');}
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doRegister();});
function show(msg){document.getElementById('errtxt').textContent=msg;document.getElementById('err').classList.add('show');}
</script>
</body>
</html>
